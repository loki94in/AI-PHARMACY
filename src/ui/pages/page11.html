<div class="page" id="page11">
    <div class="topbar">
      <div>
        <div class="page-title">🔀 Migration Tool — Data Bridge</div>
        <div class="page-subtitle">Page 11 · CSV/Excel uploader, column mapping, validation — always on</div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-title"><span class="icon">📥</span> Manual Database Migration</div>
        <p class="text-muted" style="font-size: 13px; margin-bottom: 16px;">
          Select a `.zip` SQL database backup from the <code>MIGRATION SAMPEL</code> folder and click "Run Migration" to start the import.
        </p>
        
        <div style="display: flex; gap: 12px; margin-bottom: 20px;">
          <select id="migration-file-select" style="flex: 1; padding: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--white); border-radius: 4px;">
            <option value="">Loading files...</option>
          </select>
          <button id="run-migration-btn" class="btn btn-primary">Run Migration</button>
        </div>

        <div style="background: rgba(0,0,0,0.2); padding: 16px; border-radius: 8px; border: 1px solid var(--border);">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <strong id="migration-state">Status: Idle</strong>
            <span id="migration-file" class="text-sky"></span>
          </div>
          <div style="width: 100%; background: var(--surface2); height: 8px; border-radius: 4px; overflow: hidden;">
            <div id="migration-progress" style="width: 0%; height: 100%; background: var(--green); transition: width 0.3s;"></div>
          </div>
          <div id="migration-msg" class="text-muted mt8" style="font-size: 12px;">Waiting to start...</div>
        </div>
      </div>
      <script>
        // Load available files
        async function loadFiles() {
          try {
            const resp = await fetch('/api/migration/files');
            const data = await resp.json();
            const select = document.getElementById('migration-file-select');
            select.innerHTML = '<option value="">Select a zip file...</option>';
            if (data.files && data.files.length > 0) {
              data.files.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f;
                select.appendChild(opt);
              });
            } else {
              select.innerHTML = '<option value="">No .zip files found in MIGRATION SAMPEL</option>';
            }
          } catch (e) {
            console.error('Failed to load files:', e);
          }
        }
        loadFiles();

        document.getElementById('run-migration-btn').addEventListener('click', async () => {
          const select = document.getElementById('migration-file-select');
          const fileName = select.value;
          if (!fileName) return alert('Please select a file first.');
          
          try {
            const resp = await fetch('/api/migration/run', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fileName })
            });
            const data = await resp.json();
            if (!data.success) {
              alert(data.error || 'Failed to start migration');
            }
          } catch (e) {
            console.error(e);
            alert('Error triggering migration');
          }
        });

        // Poll status
        async function pollMigrationStatus() {
          try {
            const resp = await fetch('/api/migration/status');
            if (!resp.ok) return;
            const data = await resp.json();
            
            document.getElementById('migration-state').textContent = data.active ? 'Status: Active Migration' : 'Status: Idle';
            if (data.file) document.getElementById('migration-file').textContent = data.file;
            document.getElementById('migration-progress').style.width = data.progress + '%';
            document.getElementById('migration-msg').textContent = data.message;
            
            if (data.active) {
              document.getElementById('migration-progress').style.background = 'var(--sky)';
            } else if (data.progress === 100) {
              document.getElementById('migration-progress').style.background = 'var(--green)';
            }
          } catch (e) {
            console.error('Migration poll error:', e);
          }
        }
        setInterval(pollMigrationStatus, 2000);
        pollMigrationStatus();
      </script>
    </div>
  </div>
