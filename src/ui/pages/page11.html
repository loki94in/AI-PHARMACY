<div class="page" id="page11">
    <div class="topbar">
      <div>
        <div class="page-title">🔀 Migration Tool — Data Bridge</div>
        <div class="page-subtitle">Page 11 · CSV/Excel uploader, column mapping, validation — always on</div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-title"><span class="icon">📤</span> Upload Data File</div>
        <input type="file" id="migrationFile" accept=".csv,.xlsx,.xls" />
        <button class="btn" id="runMigrationBtn">Run Migration</button>
        <div id="migrationResult" class="notice mt8"></div>
      </div>
      <script>
        document.getElementById('runMigrationBtn').addEventListener('click', async () => {
          const fileInput = document.getElementById('migrationFile');
          if (!fileInput.files.length) {
            document.getElementById('migrationResult').textContent = 'Please select a file.';
            return;
          }
          const formData = new FormData();
          formData.append('migrationName', fileInput.files[0].name);
          // In a real implementation, you would send the file itself.
          try {
            const resp = await fetch('/api/migration/run', {
              method: 'POST',
              headers: { },
              body: JSON.stringify({ migrationName: fileInput.files[0].name })
            });
            if (!resp.ok) throw new Error('Network error');
            const data = await resp.json();
            document.getElementById('migrationResult').textContent = data.message;
          } catch (e) {
            console.error('Migration error:', e);
            document.getElementById('migrationResult').textContent = 'Error running migration.';
          }
        });
      </script>
    </div>
  </div>
