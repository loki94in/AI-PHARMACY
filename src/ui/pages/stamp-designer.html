<div class="flex flex-col gap-24 h-100 overflow-y-auto pr-8">
  <div class="card p-24">
    <div class="fw-800 fs-18 text-primary mb-8"><i class="fa-solid fa-signature"></i> Stamp & Signature Studio</div>
    <div class="text-muted fs-13 mb-16">
      Upload a photo of your physical stamp or handwritten signature on blank white paper. Adjust rotation and key out the background to produce a transparent PNG for PDF billing.
    </div>
  </div>

  <div class="grid-2">
    <!-- Workspace Panel -->
    <div class="card p-20 flex flex-col gap-16">
      <div class="fw-700 fs-15 text-primary flex items-center gap-8">
        <i class="fa-solid fa-sliders"></i> Image Adjustments
      </div>

      <div class="input-group">
        <label for="designer-mode">Select Target</label>
        <select id="designer-mode" class="input-control">
          <option value="stamp">Pharmacy Stamp</option>
          <option value="signature">Pharmacist Signature</option>
        </select>
      </div>

      <div class="input-group">
        <label for="ink-preset">Ink Color Preset</label>
        <select id="ink-preset" class="input-control">
          <option value="default">Original Colors</option>
          <option value="blue">Royal Blue Ink</option>
          <option value="red">Stamp Red Ink</option>
          <option value="black">Black & Grey Ink</option>
        </select>
      </div>

      <div class="input-group">
        <label for="image-upload">Upload Photo (White Background)</label>
        <input type="file" id="image-upload" class="input-control" accept="image/*">
      </div>

      <div class="input-group">
        <div class="flex items-center gap-8">
          <input type="checkbox" id="adaptive-filter" checked style="cursor: pointer; width: 16px; height: 16px;">
          <label for="adaptive-filter" style="cursor: pointer; margin-bottom: 0; font-size: 13px; text-transform: none; letter-spacing: 0;">Enable Adaptive Shadow Removal (Shadow-Tolerant)</label>
        </div>
      </div>

      <div class="input-group">
        <div class="flex justify-between">
          <label for="rotation-slider">Rotate Angle</label>
          <span id="rotation-value" class="fs-12 font-mono fw-600 text-primary">0°</span>
        </div>
        <input type="range" id="rotation-slider" class="w-100" min="-180" max="180" value="0" style="margin-top: 8px;">
      </div>

      <div class="input-group">
        <div class="flex justify-between">
          <label for="threshold-slider">White Background Cutoff</label>
          <span id="threshold-value" class="fs-12 font-mono fw-600 text-primary">200</span>
        </div>
        <input type="range" id="threshold-slider" class="w-100" min="100" max="250" value="200" style="margin-top: 8px;">
      </div>

      <button class="btn btn-primary w-100 mt-8" id="btn-save-designer">
        <i class="fa-solid fa-cloud-arrow-up"></i> Extract & Save to System
      </button>
    </div>

    <!-- Live Preview Panel -->
    <div class="card p-20 flex flex-col gap-16 items-center justify-center relative" style="min-height: 380px;">
      <div class="fw-700 fs-15 text-primary absolute" style="top: 20px; left: 20px;">
        <i class="fa-solid fa-display"></i> Transparent PNG Preview
      </div>
      
      <!-- Interactive Preview Canvas -->
      <div class="border-all border-dashed rounded-12 p-24 bg-base relative flex items-center justify-center" style="width: 280px; height: 280px; background-image: radial-gradient(var(--border-color) 1px, transparent 0); background-size: 16px 16px;">
        <canvas id="designer-canvas" width="250" height="250" style="max-width: 100%; max-height: 100%; image-rendering: pixelated;"></canvas>
        <div id="canvas-placeholder" class="absolute text-center text-muted fs-12 p-16">
          <i class="fa-regular fa-image" style="font-size: 40px; margin-bottom: 12px; display: block; color: var(--border-color);"></i>
          No image uploaded yet.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.initStampDesigner = function() {
  const fileInput = document.getElementById('image-upload');
  const modeSelect = document.getElementById('designer-mode');
  const presetSelect = document.getElementById('ink-preset');
  const adaptiveCheck = document.getElementById('adaptive-filter');
  const rotationSlider = document.getElementById('rotation-slider');
  const rotationValue = document.getElementById('rotation-value');
  const thresholdSlider = document.getElementById('threshold-slider');
  const thresholdValue = document.getElementById('threshold-value');
  const btnSave = document.getElementById('btn-save-designer');
  const canvas = document.getElementById('designer-canvas');
  const ctx = canvas.getContext('2d');
  const placeholder = document.getElementById('canvas-placeholder');

  let uploadedImage = null;

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      uploadedImage = new Image();
      uploadedImage.onload = () => {
        placeholder.style.display = 'none';
        processImage();
      };
      uploadedImage.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  rotationSlider.addEventListener('input', () => {
    rotationValue.textContent = `${rotationSlider.value}°`;
    if (uploadedImage) processImage();
  });

  thresholdSlider.addEventListener('input', () => {
    thresholdValue.textContent = thresholdSlider.value;
    if (uploadedImage) processImage();
  });

  presetSelect.addEventListener('change', () => {
    if (uploadedImage) processImage();
  });

  adaptiveCheck.addEventListener('change', () => {
    if (uploadedImage) processImage();
  });

  modeSelect.addEventListener('change', () => {
    if (uploadedImage) processImage();
  });

  function processImage() {
    if (!uploadedImage) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    tempCtx.translate(canvas.width / 2, canvas.height / 2);
    const angleRad = (parseInt(rotationSlider.value) * Math.PI) / 180;
    tempCtx.rotate(angleRad);

    const scale = Math.min(canvas.width / uploadedImage.width, canvas.height / uploadedImage.height) * 0.9;
    const w = uploadedImage.width * scale;
    const h = uploadedImage.height * scale;
    tempCtx.drawImage(uploadedImage, -w / 2, -h / 2, w, h);

    const imgData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
    const pixels = imgData.data;
    const globalThreshold = parseInt(thresholdSlider.value);
    const useAdaptive = adaptiveCheck.checked;
    const preset = presetSelect.value;

    const gridCols = 8;
    const gridRows = 8;
    const gridBlockW = canvas.width / gridCols;
    const gridBlockH = canvas.height / gridRows;
    const localMax = new Float32Array(gridCols * gridRows);

    if (useAdaptive) {
      for (let gy = 0; gy < gridRows; gy++) {
        for (let gx = 0; gx < gridCols; gx++) {
          let maxVal = 0;
          const startX = Math.floor(gx * gridBlockW);
          const endX = Math.min(canvas.width, Math.floor((gx + 1) * gridBlockW));
          const startY = Math.floor(gy * gridBlockH);
          const endY = Math.min(canvas.height, Math.floor((gy + 1) * gridBlockH));

          for (let y = startY; y < endY; y++) {
            for (let x = startX; x < endX; x++) {
              const idx = (y * canvas.width + x) * 4;
              const brightness = (pixels[idx] + pixels[idx+1] + pixels[idx+2]) / 3;
              if (brightness > maxVal) maxVal = brightness;
            }
          }
          localMax[gy * gridCols + gx] = maxVal > 50 ? maxVal : 255;
        }
      }
    }

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        const i = (y * canvas.width + x) * 4;
        const r = pixels[i];
        const g = pixels[i+1];
        const b = pixels[i+2];
        const brightness = (r + g + b) / 3;

        let threshold = globalThreshold;
        if (useAdaptive) {
          const gx = Math.min(gridCols - 1, Math.floor(x / gridBlockW));
          const gy = Math.min(gridRows - 1, Math.floor(y / gridBlockH));
          const maxLocalBright = localMax[gy * gridCols + gx];
          threshold = maxLocalBright * (globalThreshold / 235);
        }

        if (brightness > threshold) {
          pixels[i+3] = 0;
        } else {
          if (preset === 'blue') {
            pixels[i] = Math.max(0, r - 50);
            pixels[i+1] = Math.max(0, g - 20);
            pixels[i+2] = Math.min(255, b + 60);
          } else if (preset === 'red') {
            pixels[i] = Math.min(255, r + 70);
            pixels[i+1] = Math.max(0, g - 40);
            pixels[i+2] = Math.max(0, b - 40);
          } else if (preset === 'black') {
            const minInk = Math.min(r, g, b);
            pixels[i] = minInk;
            pixels[i+1] = minInk;
            pixels[i+2] = minInk;
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
  }

  btnSave.addEventListener('click', async () => {
    if (!uploadedImage) {
      alert('Please upload an image first');
      return;
    }

    const base64Png = canvas.toDataURL('image/png');
    const endpoint = modeSelect.value === 'stamp' ? '/api/settings/upload-stamp' : '/api/settings/upload-signature';

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64Png })
      });
      const data = await res.json();
      if (data.success) {
        alert(`${modeSelect.value === 'stamp' ? 'Stamp' : 'Signature'} successfully saved to settings!`);
      } else {
        alert(data.error || 'Failed to save settings');
      }
    } catch (err) {
      console.error(err);
      alert('Error connecting to server');
    }
  });
};
</script>
