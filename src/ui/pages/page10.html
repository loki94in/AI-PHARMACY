<div class="page" id="page10" data-requires="email_parser">
    <div class="topbar">
      <div>
        <div class="page-title">📧 Email Parser — Gmail Integration</div>
        <div class="page-subtitle">Page 10 · Credentials, polling, logs</div>
      </div>
      <span class="flag-pill orange">email_parser</span>
    </div>
    <div class="content">
      <div class="flag-section">
        <span class="flag-section-label">Active Flags:</span>
        <span class="flag-pill orange">email_parser ON → Background email watcher running</span>
      </div>
      <div class="notice success">✅ Email watcher is active. Polling every 15 minutes. Last check: 2 min ago.</div>
      <div class="card">
        <div class="card-title"><span class="icon">📧</span> Send Test Email</div>
              <div class="form-row">
                <div class="field"><label>From</label><input type="email" id="emailFrom" placeholder="sender@example.com" /></div>
                <div class="field"><label>Subject</label><input type="text" id="emailSubject" placeholder="Subject" /></div>
              </div>
              <div class="form-row">
                <div class="field"><label>Body</label><textarea id="emailBody" rows="4" placeholder="Email content..."></textarea></div>
              </div>
              <button class="btn" id="sendEmailBtn">Send Email</button>
              <div id="emailResult" class="notice mt8"></div>
            <script>
              document.getElementById('sendEmailBtn').addEventListener('click', async () => {
                const payload = {
                  from: document.getElementById('emailFrom').value,
                  subject: document.getElementById('emailSubject').value,
                  body: document.getElementById('emailBody').value,
                  attachments: []
                };
                try {
                  const resp = await fetch('/api/email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });
                  if (!resp.ok) throw new Error('Network error');
                  const data = await resp.json();
                  document.getElementById('emailResult').textContent = data.message || 'Email sent';
                } catch (e) {
                  console.error('Email send failed:', e);
                  document.getElementById('emailResult').textContent = 'Error sending email';
                }
              });
            </script>
        </div>
    </div>
  </div>
