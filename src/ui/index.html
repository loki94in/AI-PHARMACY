<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pharmacy OS</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/ui/css/main.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="glass-panel">
        <div class="logo-area">
            <div class="logo-icon"><i class="fa-solid fa-staff-snake"></i></div>
            <div class="logo-text">AI Pharmacy <span class="text-primary">OS</span></div>
        </div>

        <nav class="nav-links">
            <a href="#" class="nav-item active" data-route="dashboard" title="Dashboard">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-route="pos" title="POS Billing">
                <i class="fa-solid fa-cash-register"></i>
                <span>POS Billing</span>
            </a>
            <a href="#" class="nav-item" data-route="rush" title="Rush Hour Sales">
                <i class="fa-solid fa-bolt"></i>
                <span>Rush Hour Fast Sell</span>
            </a>
            <a href="#" class="nav-item" data-route="inventory" title="Inventory Master">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span>Inventory Master</span>
            </a>
            <a href="#" class="nav-item" data-route="purchases" title="Purchases">
                <i class="fa-solid fa-truck-ramp-box"></i>
                <span>Purchases</span>
            </a>
            <a href="#" class="nav-item" data-route="returns" title="Returns & Expiry">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Returns & Expiry</span>
            </a>
            <a href="#" class="nav-item" data-route="crm" title="CRM & Patients">
                <i class="fa-solid fa-users"></i>
                <span>CRM & Patients</span>
            </a>
            <a href="#" class="nav-item" data-route="stamp-designer" title="Stamp & Signature Studio">
                <i class="fa-solid fa-signature"></i>
                <span>Stamp Studio</span>
            </a>
            <a href="#" class="nav-item" data-route="settings" title="Settings">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div id="main-wrapper">
        <header id="topbar" class="glass-panel">
            <div class="page-header">
                <h1 id="header-title">Dashboard</h1>
                <p id="header-subtitle">Overview & Real-time Analytics</p>
            </div>
            <div class="topbar-actions">
                <div class="user-profile flex items-center gap-12">
                    <div class="text-right">
                        <div class="fw-600 fs-14">Admin User</div>
                        <div class="fs-11 text-muted font-mono">PHARMACIST</div>
                    </div>
                    <div class="icon-circle-40 gradient-bg">
                        AU
                    </div>
                </div>
            </div>
        </header>

        <main id="page-content">
            <!-- Dynamic Content Injected Here -->
        </main>
    </div>

    <!-- Application Script -->
    <script type="module" src="/ui/js/app.js"></script>
</body>
</html>
